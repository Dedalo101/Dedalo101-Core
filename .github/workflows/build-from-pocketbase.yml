name: Build static data from PocketBase

on:
  workflow_dispatch:
    inputs:
      artist_slug:
        description: Single artist slug (optional — uses ARTIST_SLUGS var if empty)
        required: false
        type: string
  schedule:
    - cron: "0 3 * * *"
  repository_dispatch:
    types: [pocketbase-content-updated]

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.POCKETBASE_URL }}" ]; then
            echo "::error::POCKETBASE_URL secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.POCKETBASE_TOKEN }}" ]; then
            echo "::error::POCKETBASE_TOKEN secret is not configured"
            exit 1
          fi

      - name: Build static JSON and HTML from PocketBase
        id: build
        env:
          POCKETBASE_URL: ${{ secrets.POCKETBASE_URL }}
          POCKETBASE_TOKEN: ${{ secrets.POCKETBASE_TOKEN }}
          ARTIST_SLUG: ${{ github.event.inputs.artist_slug }}
          ARTIST_SLUGS: ${{ vars.ARTIST_SLUGS }}
          OUTPUT_DIR: ${{ github.workspace }}/data
        run: node dedalo-core/scripts/build-static.js

      - name: Commit generated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status data --porcelain 2>/dev/null)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in data/"
            exit 0
          fi
          git add data/
          git commit -m "chore: rebuild static site data from PocketBase [skip ci]"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Build summary
        if: success()
        run: |
          echo "## Build succeeded" >> $GITHUB_STEP_SUMMARY
          echo "Static files written to \`data/\`" >> $GITHUB_STEP_SUMMARY
          if [ -d data ]; then
            find data -type f | head -20 >> $GITHUB_STEP_SUMMARY || true
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Workflow failed summary
        run: |
          echo "## Build failed" >> $GITHUB_STEP_SUMMARY
          echo "Check logs for PocketBase connectivity, token permissions, or missing ARTIST_SLUGS." >> $GITHUB_STEP_SUMMARY
          echo "::error::Static build from PocketBase failed. See job logs."

      - name: Optional Slack notification
        if: ${{ vars.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text: ("Dedalo101 static build FAILED for " + $repo + " — " + $run)}')
          curl -sf -X POST -H "Content-type: application/json" \
            --data "$payload" "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification failed (non-fatal)"